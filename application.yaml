eai:
  ui:
    api-url: http://localhost:4200

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost
    prefer-ip-address: true

spring:
  cloud:
    config:
      override-system-properties: false
  datasource:
    url: jdbc:mysql://localhost:3306/userdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    generate-ddl: true
    show-sql: false
    properties:
      hibernate:
        default_schema: EAI_SCHEMA
        format_sql: true
  
      
listen:
  event:
    topic: true      
