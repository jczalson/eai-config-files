eai:
  ui:
    api-url: http://localhost:4200

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost

spring:
  cloud:
    config:
      override-system-properties: false
  datasource:
    url: jdbc:mysql://localhost:3306/userdb;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS EAI_SCHEMA
    username: root
    password:
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    generate-ddl: true
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        default_schema: EAI_SCHEMA
        format_sql: true
  
      
listen:
  event:
    topic: true      
