eureka:
    instance:
    hostname: localhost
    prefer-ip-address: true
    client:
    serviceUrl:
      defaultZone: ${eureka-service-url:http://localhost:8761/eureka}

spring:
  cloud:
    config:
      override-system-properties: false
  datasource:
    url: jdbc:mysql://${MY_DB_HOST}:${MY_DB_PORT}/${MY_DB_NAME}
    username: ${MY_DB_USER}
    password: ${MY_DB_PWD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    generate-ddl: true
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        default_schema: EAI_SCHEMA
        format_sql: true 
        ddl-auto: update 
listen:
  event:
    topic: true      
